<div class="container">
<mat-card class="card">
  <h2>Reset Password </h2>

  <form [formGroup]="forgotForm" (ngSubmit)="onReset()">

    <mat-form-field class="full">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email">

      <mat-error *ngIf="forgotForm.get('email')?.invalid">
        Email is required 
      </mat-error>
    </mat-form-field>

    <button mat-raised-button color="primary" class="full">
      Send Reset Link
    </button>

  </form>

  <p>
    <a routerLink="/signin">Back to Login</a>
  </p>
</mat-card>
</div>
