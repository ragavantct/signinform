<div class="container">
<mat-card class="card">
  <h1>Create Account</h1>
  <h2>Sign Up</h2>
    <form [formGroup]="signUpForm" (ngSubmit)="onSubmit()">

    <mat-form-field class="full">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name">
          <mat-error *ngIf="submitted && signUpForm.get('name')?.invalid">
    Name is required
  </mat-error>

    </mat-form-field> <br><br>
    <mat-form-field class="full">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email">
      <mat-error *ngIf="submitted && signUpForm.get('email')?.invalid">
  Email is required
</mat-error>
    </mat-form-field> <br><br>

    <mat-form-field class="full">
      <mat-label>Password</mat-label>
      <input matInput formControlName="password" type="password">
      <mat-error *ngIf="submitted && signUpForm.get('password')?.invalid">
  Password is required
</mat-error>
    </mat-form-field> <br><br>

    <mat-form-field class="full">
      <mat-label>Confirm Password</mat-label>
      <input matInput formControlName="confirmPassword" type="password">
      <mat-error *ngIf="submitted && signUpForm.get('confirmPassword')?.invalid">
  Confirm Password is required
</mat-error>
     <mat-error *ngIf="submitted && signUpForm.errors?.['passwordMismatch']">
  Password mismatch
</mat-error>
    </mat-form-field> <br><br>
    <button 
  mat-raised-button 
  color="warn" 
  type="button"
  (click)="clearForm()">
  Clear
</button>

    <button mat-raised-button color="primary" class="full" >
      Signup
    </button>

    </form>

<p>Already have account? 
    <a routerLink="/signin/signin.html">Login</a>
  </p>
</mat-card>
</div>
