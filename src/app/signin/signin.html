<div class="container">
<mat-card class="card">
  <h1>Welcome</h1>
  <h2>Sign In</h2>

  <form [formGroup]="signInForm" (ngSubmit)="onLogin()">

    <mat-form-field class="full">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email">

      <mat-error *ngIf="submitted && signInForm.get('email')?.invalid">
        Email is required
      </mat-error>
    </mat-form-field>

    <mat-form-field class="full">
      <mat-label>Password</mat-label>
      <input matInput formControlName="password" type="password">

      <mat-error *ngIf="submitted && signInForm.get('password')?.invalid">
        Password is required
      </mat-error>
    </mat-form-field>
    <br>

    <p class="forgot">
  <a routerLink="/forgot-password">Forgot Password?</a>
</p>
<br>
    <button mat-raised-button color="primary" class="full">
      Login
    </button>
  </form>
  
<h5>Or</h5>
  <button class="google-btn" (click)="loginWithGoogle()">
  <img src="https://imagepng.org/wp-content/uploads/2019/08/google-icon.png" alt="google" >
  Continue with Google
</button>

  <p>Don't have account? 
    <a routerLink="/signup">Signup</a>
  </p>
</mat-card>
</div>
