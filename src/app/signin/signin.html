<div class="container">
<mat-card class="card">
  <h1>Welcome</h1>
  <h2>Sign In</h2>

  <form [formGroup]="signInForm" (ngSubmit)="onLogin()">

    <mat-form-field class="full">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email">

      <mat-error *ngIf="submitted && signInForm.get('email')?.invalid">
        Email is required
      </mat-error>
    </mat-form-field>

    <mat-form-field class="full">
      <mat-label>Password</mat-label>
      <input matInput formControlName="password" type="password">

      <mat-error *ngIf="submitted && signInForm.get('password')?.invalid">
        Password is required
      </mat-error>
    </mat-form-field>
    <br>

    <p class="forgot">
  <a routerLink="/forgot-password">Forgot Password?</a>
</p>
<br>
    <button mat-raised-button color="primary" class="full">
      Login
    </button>
  </form>

  <button class="google-btn">
  <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" alt="google">
  Continue with Google
</button>

  <p>Don't have account? 
    <a routerLink="/signup">Signup</a>
  </p>
</mat-card>
</div>
